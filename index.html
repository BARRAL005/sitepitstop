m:24px;transform:translate(-50%,20px);opacity:0;background:#111;border:1px solid var(--line);color:var(--text);border-radius:16px;padding:13px 18px;transition:.2s;z-index:70}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:900px){.links{display:none}.stats,.steps,.events,.products,.testimonials,.sim-wrap{grid-template-columns:1fr}.stat{border-right:0;border-bottom:1px solid var(--line)}.location-inner{grid-template-columns:1fr}.location-photo{min-height:280px}.location-photo:after{background:linear-gradient(0deg,rgba(5,5,6,.65),transparent 68%)}.location-content{padding:28px}.mini-info{grid-template-columns:1fr}.map-frame{height:250px}.hero{padding-top:115px}h1{font-size:44px}.float-whats{left:16px;right:16px;text-align:center;justify-content:center}.brand span{display:none}}@media(max-width:520px){.wrap{width:min(100% - 28px,1180px)}.nav{inset:10px 0 auto}.nav-inner{border-radius:22px}.brand img{width:38px}.hero-logo{width:210px}.btn{width:100%;padding:14px 16px}.location-actions .btn{width:100%}.location-content{padding:22px}.title{font-size:32px}.card,.form-card{padding:22px;border-radius:22px}.address-line{font-size:15px}.brand-pill{font-size:13px;padding:10px 14px}}
</style></head><body><div id="app"></div><script>
const WHATSAPP_NUMBER = '5518996894823';
const INSTAGRAM_URL = 'https://www.instagram.com/pitstopcohab/';
const DEFAULT_MESSAGE = 'Olá! Gostaria de um orçamento para meu evento.';
const brands = ['HEINEKEN','BRAHMA','SKOL','CORONA','BUDWEISER','ORIGINAL','STELLA ARTOIS','SPATEN','AMSTEL','JACK DANIEL\'S','RED LABEL','BLACK LABEL','SMIRNOFF','TANQUERAY','ABSOLUT','BALLANTINE\'S'];
const reviews = [
 ['Mariana Alves','Atendimento rápido e bebidas bem geladas. Facilitou muito nossa festa.'],
 ['Carlos Mendes','O sistema de consignação ajudou demais, pagamos só o que consumimos.'],
 ['Juliana Rocha','Equipe muito organizada, entrega e retirada no horário combinado.'],
 ['Rafael Lima','Kit completo para churrasco, não precisei me preocupar com nada.'],
 ['Patrícia Nunes','Excelente para evento corporativo. Tudo muito profissional.'],
 ['Bruno Ferreira','Preços justos e atendimento muito educado. Recomendo.']
];
function openWhatsApp(message=DEFAULT_MESSAGE){ window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`,'_blank'); }
function calculate(people,type){ const mult = ['Casamento','Formatura'].includes(type)?1.18:type==='Churrasco'?1.1:1; return {cerveja:Math.max(2,Math.ceil((people/12)*mult)), gelo:Math.max(10,Math.ceil(people*.45*mult)), refri:Math.max(4,Math.ceil(people/8)), agua:Math.max(6,Math.ceil(people/7)), termica:Math.max(1,Math.ceil(people/45))};}
function renderSimulation(){ const n=Number(document.querySelector('#peopleRange')?.value || 80); const type=document.querySelector('#eventType')?.value || 'Aniversário'; const r=calculate(n,type); document.querySelector('#peopleLabel').textContent=n; document.querySelector('#simResult').innerHTML=[['Caixas de cerveja',r.cerveja],['Gelo estimado',`${r.gelo} kg`],['Refrigerantes',r.refri],['Águas',r.agua],['Caixas térmicas',r.termica]].map(x=>`<div class="result-item"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');}

 document.querySelector('#app').innerHTML = `
 <nav class="nav"><div class="nav-inner"><a class="brand" href="#"><img src="assets/logo-pitstop.png" alt="Pit Stop Cohab"><div>Pit Stop Cohab<small>EVENTOS</small></div></a><div class="links"><a href="#como">Como funciona</a><a href="#marcas">Marcas</a><a href="#simulador">Simulador</a><a href="#localizacao">Localização</a></div><a class="btn btn-primary" href="#contato">Orçamento</a></div></nav>
 <main>
 <section class="hero"><div class="wrap"><img class="hero-logo" src="assets/logo-pitstop.png" alt="Pit Stop Cohab"><div class="badge">Consignação para festas e eventos</div><h1>Bebidas, gelo e conveniência para seu <span>evento.</span></h1><p>Levamos tudo pronto para sua festa. Você paga apenas o que consumir e evita desperdício.</p><div class="hero-actions"><a class="btn btn-primary" href="#contato">Pedir orçamento</a><a class="btn btn-ghost" href="#simulador">Simular festa</a></div></div></section>
 <div class="stats"><div class="stat"><strong>+500</strong><span>eventos atendidos</span></div><div class="stat"><strong>+50mil</strong><span>produtos entregues</span></div><div class="stat"><strong>98%</strong><span>clientes satisfeitos</span></div><div class="stat"><strong>24h</strong><span>prazo mínimo de reserva</span></div></div>
 <section id="como"><div class="wrap"><div class="section-head"><div class="tag">Como funciona</div><h2 class="title">Do pedido ao fechamento sem complicação.</h2><p class="sub">A Pit Stop monta o kit ideal, entrega no evento e no final você acerta só o consumido.</p></div><div class="grid steps"><div class="card"><div class="num">01</div><div class="icon">📋</div><h3>Peça orçamento</h3><p>Informe data, local, convidados e perfil da festa.</p></div><div class="card"><div class="num">02</div><div class="icon">📦</div><h3>Montamos o kit</h3><p>Bebidas, gelos, térmicas e itens de conveniência.</p></div><div class="card"><div class="num">03</div><div class="icon">🎉</div><h3>Curta o evento</h3><p>Tudo fica organizado para atender seus convidados.</p></div><div class="card"><div class="num">04</div><div class="icon">✅</div><h3>Pague o consumido</h3><p>O que sobrar volta com a gente sem desperdício.</p></div></div></div></section>
 <section id="marcas"><div class="wrap"><div class="section-head"><div class="tag">Marcas</div><h2 class="title">Uma apresentação premium para seu evento.</h2><p class="sub">Trabalhamos com marcas conhecidas e produtos selecionados para diferentes tipos de festa.</p></div><div class="brand-strip"><div class="brand-track">${[...brands,...brands].map(b=>`<span class="brand-pill">${b}</span>`).join('')}</div></div><div class="grid products" style="margin-top:28px"><div class="card"><div class="icon">🍺</div><h3>Cervejas</h3><p>Lata, longneck e combos.</p></div><div class="card"><div class="icon">🥃</div><h3>Destilados</h3><p>Whisky, vodka, gin e similares.</p></div><div class="card"><div class="icon">🧊</div><h3>Gelo</h3><p>Gelo em saco, sabor e suporte para térmicas.</p></div><div class="card"><div class="icon">🥤</div><h3>Conveniência</h3><p>Refrigerantes, água, energético e petiscos.</p></div></div></div></section>
 <section id="simulador"><div class="wrap sim-wrap"><div class="form-card"><div class="tag">Simulador</div><h2 class="title">Calcule uma sugestão rápida.</h2><p class="sub">Escolha o número de pessoas e o tipo de evento.</p><div class="field"><label>Pessoas: <span id="peopleLabel">80</span></label><input type="range" id="peopleRange" min="20" max="400" value="80" step="10"></div><div class="field"><label>Tipo de evento</label><select id="eventType"><option>Aniversário</option><option>Casamento</option><option>Formatura</option><option>Corporativo</option><option>Churrasco</option></select></div><div class="result" id="simResult"></div></div><div class="form-card"><div class="tag">Eventos atendidos</div><h2 class="title">Para todo tipo de comemoração.</h2><div class="grid events" style="grid-template-columns:repeat(2,1fr);margin-top:20px"><div class="card">🎂<h3>Aniversários</h3></div><div class="card">💍<h3>Casamentos</h3></div><div class="card">🎓<h3>Formaturas</h3></div><div class="card">🔥<h3>Churrascos</h3></div></div></div></div></section>
 <section><div class="wrap"><div class="section-head"><div class="tag">Avaliações</div><h2 class="title">Clientes que recomendam.</h2><p class="sub">Depoimentos ilustrativos para apresentação comercial.</p></div><div class="testimonials">${reviews.map(r=>`<div class="card"><div class="stars">★★★★★</div><h3>${r[0]}</h3><p>“${r[1]}”</p></div>`).join('')}</div></div></section>
 <section id="localizacao"><div class="wrap"><div class="location-card"><div class="location-inner"><div class="location-photo"><img src="assets/fachada-pitstop.webp" alt="Fachada Pit Stop Cohab"><div class="photo-badge">📍 Pit Stop Cohab</div></div><div class="location-content"><div class="tag">Localização oficial</div><h2 class="title">Visite a Pit Stop Cohab.</h2><div class="address-line"><b>Endereço:</b><span>Av. Ana Jacinta, 2039 - Núcleo Bartholomeu Bueno de Miranda, Pres. Prudente - SP, 19066-030</span></div><div class="mini-info"><div><span>Atendimento</span><strong>Presidente Prudente e região</strong></div><div><span>Instagram</span><strong>@pitstopcohab</strong></div><div><span>WhatsApp</span><strong>(18) 99689-4823</strong></div></div><div class="location-actions"><a class="btn instagram-btn" target="_blank" href="${INSTAGRAM_URL}">📸 Abrir Instagram</a><a class="btn btn-ghost" target="_blank" href="https://www.google.com/maps/search/?api=1&query=Av.%20Ana%20Jacinta%202039%20Presidente%20Prudente%20SP">🗺️ Ver no Maps</a><button class="btn whats-btn" onclick="openWhatsApp()">💬 WhatsApp</button></div><iframe class="map-frame" loading="lazy" src="https://www.google.com/maps?q=Av.%20Ana%20Jacinta%202039%20Presidente%20Prudente%20SP&z=15&output=embed"></iframe></div></div></div></div></section>
 <section id="contato"><div class="wrap sim-wrap"><div><div class="tag">Orçamento</div><h2 class="title">Vamos planejar seu evento juntos.</h2><p class="sub">Preencha os dados e envie tudo direto para o WhatsApp da Pit Stop.</p></div><form class="form-card" id="quoteForm"><div class="field"><label>Nome</label><input id="name" required placeholder="Seu nome"></div><div class="field"><label>Telefone</label><input id="phone" required placeholder="(18) 99999-9999"></div><div class="field"><label>Data do evento</label><input id="date" type="date"></div><div class="field"><label>Cidade</label><input id="city" placeholder="Presidente Prudente"></div><div class="field"><label>Quantidade de pessoas</label><input id="peopleInput" type="number" min="1" value="80"></div><div class="field"><label>Observações</label><textarea id="notes" rows="4" placeholder="Ex: quero cerveja, gelo, energético e caixa térmica..."></textarea></div><button class="btn btn-primary" type="submit">Enviar pelo WhatsApp</button></form></div></section>
 <footer><div class="wrap"><strong>Pit Stop Cohab Eventos</strong><br>Conveniência em consignação para festas e eventos · Presidente Prudente e região · © 2026</div></footer><a class="float-whats" href="javascript:openWhatsApp()">💬 Solicitar orçamento</a><div class="toast" id="toast">Mensagem preparada para o WhatsApp.</div>
 </main>`;
 document.querySelector('#peopleRange').addEventListener('input',renderSimulation); document.querySelector('#eventType').addEventListener('change',renderSimulation); renderSimulation();
 document.querySelector('#quoteForm').addEventListener('submit', e=>{e.preventDefault(); const msg = `Olá! Gostaria de um orçamento para meu evento.\n\nNome: ${name.value}\nTelefone: ${phone.value}\nData: ${date.value || 'a definir'}\nCidade: ${city.value || 'a definir'}\nPessoas: ${peopleInput.value}\nObservações: ${notes.value || 'sem observações'}`; openWhatsApp(msg); const t=document.querySelector('#toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);});
}
document.addEventListener('DOMContentLoaded',buildPage);
</script></body></html>
